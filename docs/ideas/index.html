<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Idea Forecaster</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171b22;
      --body: #333942;
      --muted: #68717d;
      --canvas: #ffffff;
      --soft: #f7f8fa;
      --hairline: #dedede;
      --accent: #476a88;
      --accent-soft: #eaf2f8;
      --warm: #f8e7d8;
      --green: #e6f2e7;
      --rose: #f9e5e2;
      --radius: 14px;
      --ease: cubic-bezier(.2,.8,.2,1);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--canvas);
      color: var(--body);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 44px 32px 96px;
    }
    .head {
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      color: var(--ink);
      font-size: 38px;
      line-height: 1.1;
      font-weight: 430;
    }
    .subline {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 8px;
      max-width: 760px;
    }
    .view-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill-link,
    .chip,
    .score-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 32px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      background: var(--canvas);
      color: var(--ink);
      padding: 0 11px;
      font-size: 13px;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
    }
    .pill-link {
      cursor: pointer;
    }
    .score-chip strong {
      font-weight: 640;
    }
    .score-chip.priority { background: var(--warm); border-color: #eac8ad; }
    .score-chip.trend { background: var(--rose); border-color: #edc0ba; }
    .score-chip.novelty { background: var(--accent-soft); border-color: #c8dcec; }
    .score-chip.feasibility { background: var(--green); border-color: #c5dec7; }
    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 240px);
      gap: 12px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      background: var(--soft);
      padding: 16px;
    }
    input[type="search"],
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--canvas);
      color: var(--ink);
      padding: 0 12px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .summary-card {
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      background: var(--canvas);
      padding: 16px;
    }
    .summary-value {
      color: var(--ink);
      font-size: 26px;
      line-height: 1.1;
      font-weight: 520;
    }
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 7px;
    }
    .stage {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .topic-panel,
    .main-panel {
      border: 1px solid var(--hairline);
      border-radius: 18px;
      background: var(--soft);
      padding: 18px;
    }
    .panel-title {
      margin: 0 0 12px;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.25;
      font-weight: 560;
    }
    .topic-list {
      display: grid;
      gap: 8px;
    }
    .topic-button {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--hairline);
      border-radius: 12px;
      background: var(--canvas);
      color: var(--body);
      text-align: left;
      cursor: pointer;
      padding: 10px 12px;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }
    .topic-button:hover {
      transform: translateY(-2px);
      border-color: #c6d8e6;
      background: #fbfdff;
    }
    .topic-button.active {
      border-color: #aac3d7;
      background: var(--accent-soft);
      color: var(--ink);
    }
    .topic-button strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 560;
    }
    .topic-button span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .subtopic-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .chip {
      cursor: pointer;
    }
    .chip.active {
      background: var(--accent-soft);
      border-color: #aac3d7;
    }
    @keyframes ideaIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .idea-list {
      display: grid;
      gap: 14px;
    }
    .idea-card {
      border: 1px solid var(--hairline);
      border-radius: 16px;
      background: var(--canvas);
      padding: 20px;
      animation: ideaIn .28s var(--ease) both;
      animation-delay: calc(var(--order, 0) * 24ms);
    }
    .idea-top {
      display: grid;
      gap: 8px;
      align-items: start;
    }
    .idea-title {
      margin: 0;
      color: var(--ink);
      font-size: 21px;
      line-height: 1.28;
      font-weight: 560;
    }
    .idea-meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .scores {
      display: flex;
      gap: 6px;
      justify-content: start;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .score-help {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .idea-brief {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .brief-row {
      border: 1px solid #e7e7e7;
      border-radius: 12px;
      background: #fcfcfd;
      padding: 13px;
    }
    .brief-row strong {
      display: block;
      color: var(--ink);
      font-size: 12px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 7px;
    }
    .brief-row span {
      color: var(--body);
      font-size: 14px;
      line-height: 1.5;
    }
    .idea-details {
      margin-top: 12px;
      border: 1px solid var(--hairline);
      border-radius: 12px;
      background: var(--soft);
      padding: 0;
      overflow: hidden;
    }
    .idea-details summary {
      cursor: pointer;
      color: var(--ink);
      font-size: 13px;
      line-height: 1;
      font-weight: 560;
      padding: 13px;
      user-select: none;
    }
    .idea-detail-body {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0 13px 13px;
    }
    .field-box {
      border: 1px solid #e7e7e7;
      border-radius: 12px;
      background: #fcfcfd;
      padding: 13px;
    }
    .field-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 7px;
    }
    .field-text {
      color: var(--body);
      font-size: 14px;
      line-height: 1.5;
    }
    .evidence {
      grid-column: 1 / -1;
      display: grid;
      gap: 7px;
    }
    .evidence a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.35;
    }
    .evidence a:hover { text-decoration: underline; }
    .reader-close {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--canvas);
      color: var(--ink);
      padding: 0 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .reader-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(24,29,38,.34);
      backdrop-filter: blur(8px);
    }
    .reader-overlay.active {
      display: flex;
    }
    .reader {
      width: min(980px, 100%);
      max-height: min(820px, calc(100vh - 56px));
      overflow: auto;
      border-radius: 18px;
      background: var(--canvas);
      color: var(--body);
      padding: 36px;
      box-shadow: 0 28px 90px rgba(24,29,38,.24);
    }
    .reader-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--hairline);
      padding-bottom: 22px;
      margin-bottom: 24px;
    }
    .reader-kicker {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    .reader h2 {
      margin: 0;
      max-width: 760px;
      color: var(--ink);
      font-size: 32px;
      line-height: 1.18;
      font-weight: 400;
    }
    .reader-markdown {
      border: 1px solid var(--hairline);
      border-radius: 14px;
      background: var(--soft);
      padding: 18px;
    }
    .reader-markdown h2 {
      margin: 24px 0 12px;
      border-top: 1px solid var(--hairline);
      padding-top: 18px;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.25;
      font-weight: 520;
    }
    .reader-markdown h2:first-child {
      margin-top: 0;
      border-top: 0;
      padding-top: 0;
    }
    .reader-markdown h3 {
      margin: 18px 0 8px;
      color: var(--ink);
      font-size: 17px;
      line-height: 1.35;
      font-weight: 520;
    }
    .reader-markdown h4 {
      margin: 16px 0 8px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.4;
      font-weight: 600;
    }
    .reader-markdown p,
    .reader-markdown li {
      margin: 0;
      color: var(--body);
      font-size: 14px;
      line-height: 1.55;
    }
    .reader-markdown p {
      margin-bottom: 10px;
    }
    .reader-markdown ul {
      margin: 0 0 14px;
      padding-left: 18px;
    }
    .reader-markdown li + li {
      margin-top: 7px;
    }
    .reader-markdown code {
      border: 1px solid var(--hairline);
      border-radius: 5px;
      background: var(--canvas);
      padding: 1px 5px;
      font-size: 13px;
    }
    .reader-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 22px;
    }
    .reader-links a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      border: 1px solid var(--ink);
      border-radius: 10px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 500;
    }
    .empty {
      border: 1px dashed var(--hairline);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--canvas);
      padding: 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      .shell { padding: 30px 18px 72px; }
      h1 { font-size: 31px; }
      .controls,
      .stage,
      .idea-detail-body,
      .idea-top {
        grid-template-columns: 1fr;
      }
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .scores {
        justify-content: start;
      }
      .reader {
        padding: 24px;
      }
      .reader-top {
        display: block;
      }
      .reader-close {
        margin-top: 16px;
      }
    }
    @media (max-width: 560px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

    const readerOverlay = document.getElementById("readerOverlay");
    const reader = document.getElementById("reader");

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, function(char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
      });
    }
    function ideaText(idea) {
      return [
        idea.title,
        idea.majorLabel,
        idea.subtopicLabel,
        idea.question,
        idea.whyNow,
        idea.gap,
        idea.contribution,
        idea.dataNeeded,
        idea.methodSuggestion,
        (idea.evidence || []).map(function(paper) { return paper.title + " " + paper.journal; }).join(" ")
      ].join(" ").toLowerCase();
    }
    function topicOptions() {
      const counts = new Map();
      for (const idea of data.ideas) {
        if (!counts.has(idea.majorKey)) counts.set(idea.majorKey, { key: idea.majorKey, label: idea.majorLabel, count: 0, score: 0 });
        const item = counts.get(idea.majorKey);
        item.count += 1;
        item.score = Math.max(item.score, idea.scores.priority);
      }
      return [{ key: "all", label: "All topics", count: data.ideas.length, score: 0 }]
        .concat([...counts.values()].sort(function(a, b) { return b.score - a.score || a.label.localeCompare(b.label); }));
    }
    function subtopicOptions(ideas) {
      const counts = new Map();
      for (const idea of ideas) {
        if (!counts.has(idea.subtopicKey)) counts.set(idea.subtopicKey, { key: idea.subtopicKey, label: idea.subtopicLabel, count: 0, score: 0 });
        const item = counts.get(idea.subtopicKey);
        item.count += 1;
        item.score = Math.max(item.score, idea.scores.priority);
      }
      return [{ key: "all", label: "All subtopics", count: ideas.length, score: 0 }]
        .concat([...counts.values()].sort(function(a, b) { return b.score - a.score || a.label.localeCompare(b.label); }));
    }
    function filteredIdeas() {
      const query = state.query.trim().toLowerCase();
      return data.ideas.filter(function(idea) {
        const topicOk = state.topic === "all" || idea.majorKey === state.topic;
        const subtopicOk = state.subtopic === "all" || idea.subtopicKey === state.subtopic;
        const queryOk = !query || ideaText(idea).includes(query);
        return topicOk && subtopicOk && queryOk;
      }).sort(function(a, b) {
        const key = state.sort;
        const scoreDiff = (b.scores[key] || 0) - (a.scores[key] || 0);
        if (scoreDiff) return scoreDiff;
        return a.title.localeCompare(b.title);
      });
    }
    function renderSummary() {
      const items = [
        { value: data.totalPapers, label: "source papers" },
        { value: data.ideas.length, label: "high-priority ideas" },
        { value: data.minPriorityScore + "+", label: "minimum overall score" },
        { value: data.minReferencePapers + "+", label: "minimum references" }
      ];
      summaryGrid.innerHTML = items.map(function(item) {
        return '<article class="summary-card"><div class="summary-value">' + esc(item.value) + '</div><div class="summary-label">' + esc(item.label) + '</div></article>';
      }).join("");
      subline.textContent = "Ideas are generated from prior limitations, differentiators, topic trends, journals, datasets, and reference support in the local vault.";
      const labels = data.scoreLabels || { priority: "Overall", trend: "Trend", novelty: "Novelty", feasibility: "Feasibility" };
      scoreHelp.textContent = "Score labels: " + labels.priority + " = final priority score, " + labels.trend + " = recent topic momentum, " + labels.novelty + " = gap/newness, " + labels.feasibility + " = reference/data/method support. Only " + labels.priority + " " + data.minPriorityScore + "+ ideas are shown.";
    }
    function renderTopics() {
      topicList.innerHTML = topicOptions().map(function(topic) {
        return '<button type="button" class="topic-button' + (topic.key === state.topic ? ' active' : '') + '" data-topic="' + esc(topic.key) + '">'
          + '<strong>' + esc(topic.label) + '</strong>'
          + '<span>' + esc(topic.count) + ' ideas' + (topic.score ? ' · top score ' + esc(topic.score) : '') + '</span>'
          + '</button>';
      }).join("");
    }
    function renderSubtopics(baseIdeas) {
      subtopicStrip.innerHTML = subtopicOptions(baseIdeas).map(function(subtopic) {
        return '<button type="button" class="chip' + (subtopic.key === state.subtopic ? ' active' : '') + '" data-subtopic="' + esc(subtopic.key) + '">' + esc(subtopic.label) + ' · ' + esc(subtopic.count) + '</button>';
      }).join("");
    }
    function renderIdeas() {
      const topicIdeas = data.ideas.filter(function(idea) { return state.topic === "all" || idea.majorKey === state.topic; });
      renderSubtopics(topicIdeas);
      const ideas = filteredIdeas();
      const topicLabel = state.topic === "all" ? "Idea candidates" : (topicOptions().find(function(item) { return item.key === state.topic; }) || {}).label;
      mainTitle.textContent = topicLabel + " (" + ideas.length + ")";
      ideaList.innerHTML = ideas.length ? ideas.map(function(idea, index) {
        return '<article class="idea-card" style="--order:' + index + '">'
          + '<div class="idea-top">'
          + '<h3 class="idea-title">' + esc(idea.title) + '</h3>'
          + '<div class="idea-meta">' + esc(idea.majorLabel) + ' / ' + esc(idea.subtopicLabel) + ' · ' + esc(idea.type) + ' · refs ' + esc(idea.referenceCount || 0) + '</div>'
          + '<div class="scores">'
          + '<span class="score-chip priority"><strong>' + esc((data.scoreLabels || {}).priority || "Overall") + '</strong> ' + esc(idea.scores.priority) + '</span>'
          + '<span class="score-chip trend"><strong>' + esc((data.scoreLabels || {}).trend || "Trend") + '</strong> ' + esc(idea.scores.trend) + '</span>'
          + '<span class="score-chip novelty"><strong>' + esc((data.scoreLabels || {}).novelty || "Novelty") + '</strong> ' + esc(idea.scores.novelty) + '</span>'
          + '<span class="score-chip feasibility"><strong>' + esc((data.scoreLabels || {}).feasibility || "Feasibility") + '</strong> ' + esc(idea.scores.feasibility) + '</span>'
          + '</div></div>'
          + '<div class="idea-brief">'
          + briefRow("Gap", idea.gap)
          + briefRow("Differentiator", idea.contribution)
          + '</div>'
          + '<details class="idea-details">'
          + '<summary>Details and evidence</summary>'
          + '<div class="idea-detail-body">'
          + fieldBox("Question", idea.question)
          + fieldBox("Why now", idea.whyNow)
          + fieldBox("Data", idea.dataNeeded)
          + fieldBox("Method", idea.methodSuggestion)
          + '<div class="evidence"><div class="field-label">Evidence papers</div>'
          + (idea.evidence || []).map(function(paper) {
            return '<a href="' + esc(paper.notePath) + '">' + esc(paper.title) + ' (' + esc(paper.year) + ', ' + esc(paper.journal) + ')</a>';
          }).join("")
          + '</div>'
          + '</div>'
          + '</details>'
          + '</article>';
      }).join("") : '<div class="empty">No idea candidates match this filter.</div>';
    }
    function briefRow(label, text) {
      return '<div class="brief-row"><strong>' + esc(label) + '</strong><span>' + esc(text) + '</span></div>';
    }
    function fieldBox(label, text) {
      return '<div class="field-box"><div class="field-label">' + esc(label) + '</div><div class="field-text">' + esc(text) + '</div></div>';
    }
    function stripWikiLinks(text) {
      return String(text ?? "")
        .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, "$2")
        .replace(/\[\[([^\]]+)\]\]/g, "$1");
    }
    function inlineMarkdown(text) {
      return esc(stripWikiLinks(text))
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(new RegExp("\\x60([^\\x60]+)\\x60", "g"), '<code>$1</code>');
    }
    function markdownToReaderHtml(markdown) {
      if (!markdown) return '<p>Not recorded.</p>';
      const lines = markdown.split(/\r?\n/);
      let html = '';
      let inList = false;
      function closeList() {
        if (inList) {
          html += '</ul>';
          inList = false;
        }
      }
      lines.forEach(function(line) {
        const trimmed = line.trim();
        if (!trimmed) {
          closeList();
          return;
        }
        if (trimmed.startsWith('# ')) {
          return;
        }
        if (trimmed.startsWith('## ')) {
          closeList();
          html += '<h2>' + inlineMarkdown(trimmed.slice(3)) + '</h2>';
          return;
        }
        if (trimmed.startsWith('### ')) {
          closeList();
          html += '<h3>' + inlineMarkdown(trimmed.slice(4)) + '</h3>';
          return;
        }
        if (trimmed.startsWith('#### ')) {
          closeList();
          html += '<h4>' + inlineMarkdown(trimmed.slice(5)) + '</h4>';
          return;
        }
        if (trimmed.startsWith('- ')) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += '<li>' + inlineMarkdown(trimmed.slice(2)) + '</li>';
          return;
        }
        closeList();
        html += '<p>' + inlineMarkdown(trimmed) + '</p>';
      });
      closeList();
      return html;
    }
    function openReader() {
      reader.innerHTML = ''
        + '<div class="reader-top">'
        + '<div>'
        + '<div class="reader-kicker">Markdown ideas / generated from local vault</div>'
        + '<h2>Next Paper Ideas</h2>'
        + '</div>'
        + '<button type="button" class="reader-close">Close</button>'
        + '</div>'
        + '<div class="reader-markdown">' + markdownToReaderHtml(data.ideasMarkdown) + '</div>'
        + '<div class="reader-links"><a href="../ideas/Next%20Paper%20Ideas.md">Open source MD</a></div>';
      readerOverlay.classList.add('active');
      reader.querySelector('.reader-close').focus();
    }
    function closeReader() {
      readerOverlay.classList.remove('active');
      reader.innerHTML = '';
    }
    function renderAll() {
      renderSummary();
      renderTopics();
      renderIdeas();
    }
    topicList.addEventListener("click", function(event) {
      const button = event.target.closest(".topic-button");
      if (!button) return;
      state.topic = button.dataset.topic;
      state.subtopic = "all";
      renderTopics();
      renderIdeas();
    });
    subtopicStrip.addEventListener("click", function(event) {
      const button = event.target.closest(".chip");
      if (!button) return;
      state.subtopic = button.dataset.subtopic;
      renderIdeas();
    });
    searchInput.addEventListener("input", function(event) {
      state.query = event.target.value;
      renderIdeas();
    });
    sortSelect.addEventListener("change", function(event) {
      state.sort = event.target.value;
      renderIdeas();
    });
    openIdeasMd.addEventListener("click", openReader);
    readerOverlay.addEventListener("click", function(event) {
      if (event.target === readerOverlay || event.target.closest(".reader-close")) closeReader();
    });
    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape" && readerOverlay.classList.contains("active")) closeReader();
    });
    renderAll();
  </script>
</body>
</html>
